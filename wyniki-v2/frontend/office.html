<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎾</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://stats.dawidsuchodolski.pl/script.js" data-website-id="b49919d3-6628-40cc-9213-72ec52409e28"></script>
  <style>
    :root {
      --office-ink: #1b2430;
      --office-muted: #5f6b7a;
      --office-accent: #0f766e;
      --office-accent-soft: rgba(15, 118, 110, 0.14);
      --office-highlight: #c2410c;
      --office-panel: rgba(255, 252, 247, 0.92);
      --office-line: rgba(27, 36, 48, 0.12);
      --office-shadow: 0 30px 80px rgba(48, 37, 20, 0.14);
    }

    body.office-body {
      min-height: 100vh;
      font-family: 'Outfit', 'Segoe UI', sans-serif;
      color: var(--office-ink);
      background:
        radial-gradient(circle at top left, rgba(194, 65, 12, 0.18), transparent 34%),
        radial-gradient(circle at right 15% top 12%, rgba(15, 118, 110, 0.18), transparent 30%),
        linear-gradient(180deg, #f6efe3 0%, #f2f4ef 48%, #eef3f5 100%);
    }

    .office-shell {
      width: min(1360px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .office-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 30px;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.84), rgba(255, 248, 240, 0.72)),
        linear-gradient(135deg, rgba(15, 118, 110, 0.18), rgba(194, 65, 12, 0.1));
      box-shadow: var(--office-shadow);
      backdrop-filter: blur(16px);
    }

    .office-hero::after {
      content: '';
      position: absolute;
      inset: auto -120px -120px auto;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.16) 0%, transparent 70%);
    }

    .office-hero-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px 28px;
      align-items: start;
    }

    .office-hero-title {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .office-hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      min-width: min(100%, 520px);
    }

    .office-primary-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .office-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 0;
    }

    .office-panel {
      border: 1px solid var(--office-line);
      background: var(--office-panel);
      box-shadow: 0 18px 40px rgba(17, 24, 39, 0.06);
      backdrop-filter: blur(14px);
    }

    .office-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .office-chip-group {
      background: rgba(15, 118, 110, 0.12);
      color: #0f766e;
    }

    .office-chip-knockout {
      background: rgba(194, 65, 12, 0.12);
      color: #c2410c;
    }

    .office-chip-neutral {
      background: rgba(55, 65, 81, 0.1);
      color: #374151;
    }

    .office-stat {
      border-radius: 24px;
      border: 1px solid var(--office-line);
      background: rgba(255, 255, 255, 0.68);
      padding: 18px 20px;
      min-height: 118px;
    }

    .office-history-card {
      border-radius: 24px;
      padding: 20px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .office-history-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(17, 24, 39, 0.08);
    }

    .office-history-scoreboard {
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.74);
      overflow: hidden;
    }

    .office-history-card .hm-player {
      padding: 12px 16px;
      min-height: 48px;
    }

    .office-history-card .hm-player-name {
      font-size: 1rem;
      color: #1f2937;
    }

    .office-history-card .hm-set-cell {
      min-width: 34px;
      font-size: 1rem;
      color: #475569;
    }

    .office-history-card .hm-player--winner .hm-player-name,
    .office-history-card .hm-player--winner .hm-set-cell {
      color: #0f172a;
    }

    .office-tab {
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      color: var(--office-muted);
      transition: all 0.2s ease;
    }

    .office-tab.is-active {
      color: #fff;
      background: linear-gradient(135deg, #0f766e, #115e59);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.24);
    }

    .office-alert-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 12px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.62);
      width: 100%;
    }

    .office-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    .office-toggle input {
      width: 18px;
      height: 18px;
      accent-color: #0f766e;
    }

    .office-login {
      width: min(560px, calc(100vw - 32px));
      margin: 12vh auto 0;
      border-radius: 32px;
      padding: 32px;
    }

    .office-logo {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    .office-summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr);
      gap: 24px;
      margin-top: 24px;
    }

    .office-match-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .office-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(10px);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .office-modal {
      width: min(760px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      border-radius: 28px;
      padding: 26px;
    }

    @media (max-width: 1024px) {
      .office-hero-top {
        grid-template-columns: 1fr;
      }

      .office-hero-actions {
        min-width: 0;
        width: 100%;
        align-items: stretch;
      }

      .office-primary-actions {
        justify-content: flex-start;
      }

      .office-alert-controls {
        justify-content: flex-start;
      }

      .office-summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .office-shell {
        width: calc(100vw - 20px);
        padding-top: 12px;
      }

      .office-hero,
      .office-login,
      .office-modal {
        padding: 20px;
        border-radius: 24px;
      }

      .office-match-grid {
        grid-template-columns: 1fr;
      }
    }

    .office-lang-bar {
      position: sticky;
      top: 0;
      z-index: 70;
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px 0;
      pointer-events: none;
    }

    .office-lang-bar__inner {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 10px 30px rgba(27, 36, 48, 0.08);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="office-body" x-data="officeApp()" x-init="init()" x-effect="applyOfficeDocumentLang()">
  <div class="office-lang-bar">
    <div class="office-lang-bar__inner">
      <label class="sr-only" for="officeLangSelect" x-text="officeUi().languageSelect"></label>
      <select id="officeLangSelect" class="lang-select" x-model="lang" @change="onLangChange()">
        <option value="pl">Polski</option>
        <option value="de">Deutsch</option>
        <option value="en">English</option>
        <option value="it">Italiano</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </div>
  <div class="toast toast-top toast-end z-[80]" x-show="toast.show" x-transition.opacity x-cloak>
    <div class="alert" :class="{
      'alert-success': toast.type === 'success',
      'alert-warning': toast.type === 'warning',
      'alert-error': toast.type === 'error',
      'alert-info': toast.type === 'info'
    }">
      <span x-text="toast.message"></span>
    </div>
  </div>

  <main x-show="!isAuthenticated" x-cloak>
    <section class="office-login office-panel">
      <div>
        <div>
          <span class="office-chip office-chip-group" x-text="ot('login.slotChip', { slot })"></span>
          <h1 class="office-title mt-4" x-text="ot('login.title')"></h1>
        </div>
      </div>

      <div class="mt-8 rounded-[28px] border border-white/70 bg-white/60 p-5" x-show="tournamentMeta || metaLoading" x-cloak>
        <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('login.tournamentAssigned')"></div>
        <div class="mt-3" x-show="metaLoading && !tournamentMeta" x-text="ot('login.loadingTournament')"></div>
        <template x-if="tournamentMeta">
          <div>
            <div class="flex items-start justify-between gap-4 flex-wrap">
              <div>
                <div class="text-2xl font-semibold text-slate-900" x-text="tournamentMeta.name"></div>
                <div class="mt-2 text-sm text-slate-500" x-text="(tournamentMeta.start_date || ot('login.noDate')) + (tournamentMeta.end_date ? ' - ' + tournamentMeta.end_date : '')"></div>
              </div>
              <div class="flex gap-2 flex-wrap">
                <span class="office-chip" :class="tournamentMeta.active ? 'office-chip-group' : 'office-chip-neutral'" x-text="tournamentMeta.active ? ot('login.activeTournament') : ot('login.inactivePreview')"></span>
                <span class="office-chip office-chip-knockout" x-show="tournamentMeta.is_simulation" x-text="ot('login.simulation')"></span>
              </div>
            </div>
          </div>
        </template>
      </div>

      <form class="mt-8 space-y-5" @submit.prevent="authenticate">
        <label class="form-control">
          <span class="label-text text-slate-700 font-semibold mb-2" x-text="ot('login.passwordLabel')"></span>
          <input type="password" class="input input-bordered input-lg w-full bg-white/90" x-model="authPassword" :placeholder="ot('login.passwordPlaceholder')">
        </label>
        <div class="text-sm text-red-700 min-h-6" x-text="authError"></div>
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <button type="submit" class="btn btn-lg border-0 text-white" style="background: linear-gradient(135deg, #0f766e, #115e59);" :class="{'btn-disabled': authLoading}">
            <span x-show="!authLoading" x-text="ot('login.enter')"></span>
            <span x-show="authLoading" x-text="ot('login.loggingIn')"></span>
          </button>
        </div>
      </form>
    </section>
  </main>

  <main class="office-shell" x-show="isAuthenticated" x-cloak>
    <section class="office-hero">
      <div class="office-hero-top relative z-10">
        <div class="office-hero-title">
          <template x-if="tournamentMeta?.logo_path">
            <img :src="tournamentMeta.logo_path" :alt="ot('hero.logoAlt')" class="office-logo">
          </template>
          <template x-if="!tournamentMeta?.logo_path">
            <div class="office-logo bg-white/60 flex items-center justify-center text-3xl">🎾</div>
          </template>
          <div class="min-w-0">
            <h1 class="office-title" x-text="tournamentMeta?.name || dashboard?.tournament?.name || ot('hero.defaultTitle')"></h1>
          </div>
        </div>
        <div class="office-hero-actions">
          <div class="office-alert-controls">
            <label class="office-toggle">
              <input type="checkbox" :checked="notificationsEnabled" @change="toggleNotifications()">
              <span x-text="ot('hero.notifications')"></span>
            </label>
            <button type="button" class="btn btn-sm btn-outline bg-white/85" @click="testNotifications()" x-text="ot('hero.testNotification')"></button>
            <span class="text-xs text-slate-500" x-show="notificationPermission === 'denied'" x-text="ot('hero.browserBlocksNotifications')"></span>
          </div>
          <div class="office-primary-actions">
            <button type="button" class="btn btn-outline bg-white/80 border-white/70" @click="loadDashboard()" x-text="ot('hero.refresh')"></button>
            <button type="button" class="btn border-0 text-white" style="background: linear-gradient(135deg, #c2410c, #9a3412);" @click="openAddMatchModal()" x-text="ot('hero.addResult')"></button>
            <button type="button" class="btn btn-ghost text-slate-600" @click="logout()" x-text="ot('hero.logout')"></button>
          </div>
        </div>
      </div>

      <div class="grid gap-4 lg:grid-cols-4 mt-8 relative z-10">
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('stats.progress')"></div>
          <div class="mt-3 text-4xl font-semibold" x-text="`${officeProgressPercent()}%`"></div>
          <progress class="progress mt-4" :value="officeProgressPercent()" max="100"></progress>
        </article>
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('stats.finishedMatches')"></div>
          <div class="mt-3 text-4xl font-semibold" x-text="dashboard?.progress?.finished_matches || 0"></div>
          <div class="mt-3 text-sm text-slate-500" x-text="ot('stats.ofExpected', { count: dashboard?.progress?.expected_matches || 0 })"></div>
        </article>
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('stats.remaining')"></div>
          <div class="mt-3 text-4xl font-semibold" x-text="dashboard?.progress?.remaining_matches || 0"></div>
          <div class="mt-3 text-sm text-slate-500" x-text="ot('stats.remainingDesc')"></div>
        </article>
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('stats.bracket')"></div>
          <div class="mt-3 text-4xl font-semibold" x-text="`${officeKnockout.finished_matches || 0}/${officeKnockout.expected_matches || 0}`"></div>
          <div class="mt-3 text-sm text-slate-500" x-text="ot('stats.readyToPlay', { count: officeKnockout.ready_matches || 0 })"></div>
        </article>
      </div>

      <div class="mt-6 office-panel rounded-[24px] p-5 relative z-10">
        <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('quickInfo.subtitle')"></div>
        <h2 class="mt-2 text-xl font-semibold" x-text="ot('quickInfo.title')"></h2>
        <p class="mt-1 text-sm text-slate-500" x-text="ot('quickInfo.description')"></p>
        <textarea
          class="textarea textarea-bordered w-full mt-4 min-h-[96px] bg-white/80"
          x-model="quickInfoMessage"
          :placeholder="ot('quickInfo.placeholder')"
          maxlength="2000"
        ></textarea>
        <div class="mt-3 flex items-center gap-3 flex-wrap">
          <label class="office-toggle">
            <input type="checkbox" x-model="quickInfoActive">
            <span x-text="ot('quickInfo.showPublic')"></span>
          </label>
          <button
            type="button"
            class="btn btn-sm border-0 text-white"
            style="background: linear-gradient(135deg, #0f766e, #115e59);"
            @click="saveQuickInfo()"
            :class="{'btn-disabled': quickInfoSaving}"
            x-text="ot('quickInfo.publish')"
          ></button>
          <button
            type="button"
            class="btn btn-sm btn-outline bg-white/80"
            @click="hideQuickInfo()"
            x-show="quickInfoActive && quickInfoMessage"
            :class="{'btn-disabled': quickInfoSaving}"
            x-text="ot('quickInfo.hide')"
          ></button>
          <span class="text-xs text-slate-500" x-show="quickInfoUpdatedAt" x-text="ot('quickInfo.updated', { time: formatQuickInfoTime(quickInfoUpdatedAt) })"></span>
        </div>
      </div>
    </section>

    <section class="mt-8 office-panel rounded-[28px] p-4 md:p-5">
      <div class="flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-2 flex-wrap">
          <button type="button" class="office-tab" :class="{'is-active': activeTab === 'history'}" @click="activeTab = 'history'" x-text="ot('tabs.history')"></button>
          <button type="button" class="office-tab" :class="{'is-active': activeTab === 'progress'}" @click="activeTab = 'progress'" x-text="ot('tabs.progress')"></button>
          <button type="button" class="office-tab" :class="{'is-active': activeTab === 'knockout'}" @click="activeTab = 'knockout'" x-text="ot('tabs.knockout')"></button>
          <button type="button" class="office-tab" :class="{'is-active': activeTab === 'planning'}" @click="openPlanningTab()" x-text="ot('tabs.planning')"></button>
        </div>
        <div class="text-sm text-slate-500" x-show="loading" x-text="ot('tabs.refreshing')"></div>
      </div>
    </section>

    <section class="mt-6 space-y-6" x-show="activeTab === 'planning'" x-cloak>
      <div class="office-panel rounded-[28px] p-5 md:p-6">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('planning.subtitle')"></div>
            <h2 class="mt-2 text-3xl font-semibold" x-text="ot('planning.title')"></h2>
            <p class="mt-2 text-sm text-slate-500" x-text="ot('planning.description')"></p>
          </div>
          <button type="button" class="btn btn-outline bg-white/80" @click="loadOfficePlanningData()" :class="{'btn-disabled': planningLoading}" x-text="ot('planning.refreshPlan')"></button>
        </div>
        <div class="mt-5 grid gap-4 md:grid-cols-4">
          <div class="office-stat"><div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('planning.players')"></div><div class="mt-2 text-3xl font-semibold" x-text="planningPlayers.length"></div></div>
          <div class="office-stat"><div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('planning.groups')"></div><div class="mt-2 text-3xl font-semibold" x-text="planningGroups.length"></div></div>
          <div class="office-stat"><div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('planning.entries')"></div><div class="mt-2 text-3xl font-semibold" x-text="planningSchedule.length"></div></div>
          <div class="office-stat"><div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('planning.courts')"></div><div class="mt-2 text-3xl font-semibold" x-text="planningCourts.length"></div></div>
        </div>
      </div>

      <div class="office-panel rounded-[28px] p-5 md:p-6">
        <div class="flex items-start justify-between gap-4 flex-wrap cursor-pointer" @click="planningStep1Collapsed = !planningStep1Collapsed">
          <div class="flex items-start gap-3">
            <span class="mt-1 text-slate-400 transition-transform" :class="planningStep1Collapsed ? '' : 'rotate-90'">▶</span>
            <div>
              <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('planning.step1')"></div>
              <h3 class="mt-2 text-2xl font-semibold" x-text="ot('planning.step1Title')"></h3>
              <p class="mt-1 text-sm text-slate-500" x-show="!planningStep1Collapsed" x-text="ot('planning.step1Open')"></p>
              <p class="mt-1 text-sm text-emerald-700 font-semibold" x-show="planningStep1Collapsed && planningGroupsComplete()" x-text="planningStep1CompleteLine()"></p>
              <p class="mt-1 text-sm text-amber-700 font-semibold" x-show="planningStep1Collapsed && !planningGroupsComplete()" x-text="ot('planning.step1InProgress')"></p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 text-sm font-semibold text-emerald-600" x-show="planningSaving">
              <span class="loading loading-spinner loading-sm"></span> <span x-text="ot('planning.saving')"></span>
            </div>
            <span class="btn btn-sm btn-ghost" x-text="planningStep1Collapsed ? ot('planning.edit') : ot('planning.collapse')"></span>
          </div>
        </div>

        <div x-show="!planningStep1Collapsed">
        <div class="mt-5 rounded-[22px] border border-emerald-200 bg-emerald-50/60 p-4" x-show="!tournamentCategories.length || categorySetupOpen">
          <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500" x-text="ot('planning.categoriesSetup')"></div>
          <p class="mt-1 text-sm text-slate-600" x-text="ot('planning.categoriesSetupHint')"></p>
          <div class="mt-3 flex flex-wrap gap-2">
            <template x-for="preset in planningCategoryPresetKeys()" :key="'preset_'+preset">
              <label class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white/90 px-3 py-1.5 text-sm cursor-pointer">
                <input type="checkbox" class="checkbox checkbox-sm checkbox-primary" x-model="categoryPresetSelected[preset]">
                <span x-text="planningCategoryPresetLabel(preset)"></span>
              </label>
            </template>
          </div>
          <div class="mt-3 grid gap-2 sm:grid-cols-3">

                      <button type="button"
                              class="absolute right-1 top-1 inline-flex h-5 w-5 items-center justify-center rounded-full text-slate-400 hover:bg-rose-50 hover:text-rose-600"
                              :title="ot('planning.removeEntry')"
                              @click.stop="deletePlanningScheduleEntry(entry, { skipConfirm: true })"
                              x-text="'×'"></button>
                      <div class="text-sm font-semibold text-slate-900">
                        <span x-text="entry.player1_name || '—'"></span>
                        <span class="text-slate-400" x-text="' ' + ot('versus') + ' '"></span>
                        <span x-text="entry.player2_name || '—'"></span>
                      </div>
                      <div class="text-[11px] text-slate-500" x-text="officeDisplayLabel(entry.category_name)"></div>
                      <div class="text-[10px] text-amber-800 mt-0.5" x-text="planningUnassignedDayLabel(entry)"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="mt-5">
          <button type="button" class="text-sm font-semibold text-slate-500 hover:text-slate-800" @click="planningManualOpen = !planningManualOpen" x-text="planningManualOpen ? ot('planning.hideManual') : ot('planning.showManual')"></button>
          <div class="mt-3 rounded-[24px] border border-slate-200/80 bg-white/65 p-4" x-show="planningManualOpen" x-cloak>
            <div class="grid gap-3 lg:grid-cols-6">
              <input type="date" class="input input-bordered bg-white/90" x-model="planningNewSchedule.day_date">
              <input type="time" class="input input-bordered bg-white/90" x-model="planningNewSchedule.scheduled_time">
              <select class="select select-bordered bg-white/90" x-model="planningNewSchedule.court_id">
                <option value="" x-text="ot('planning.courtQuestion')"></option>
                <template x-for="court in planningCourts" :key="'office_new_schedule_court_'+court.kort_id">
                  <option :value="court.kort_id" x-text="court.name || court.kort_id"></option>
                </template>
              </select>
              <input type="text" class="input input-bordered bg-white/90" :placeholder="ot('planning.categoryPlaceholder')" x-model="planningNewSchedule.category_name">
              <input type="text" class="input input-bordered bg-white/90" :placeholder="ot('planning.phasePlaceholder')" x-model="planningNewSchedule.phase">
              <select class="select select-bordered bg-white/90" x-model="planningNewSchedule.status">
                <template x-for="option in scheduleStatusOptions()" :key="'office_new_status_'+option.value">
                  <option :value="option.value" x-text="option.label"></option>
                </template>
              </select>
              <select class="select select-bordered bg-white/90 lg:col-span-2" x-model="planningNewSchedule.player1_name">
                <option value="" x-text="ot('planning.player1')"></option>
                <template x-for="name in planningPlayerNameOptions()" :key="'office_new_p1_'+name">
                  <option :value="name" x-text="name"></option>
                </template>
              </select>
              <select class="select select-bordered bg-white/90 lg:col-span-2" x-model="planningNewSchedule.player2_name">
                <option value="" x-text="ot('planning.player2')"></option>
                <template x-for="name in planningPlayerNameOptions()" :key="'office_new_p2_'+name">
                  <option :value="name" x-text="name"></option>
                </template>
              </select>
              <input type="text" class="input input-bordered bg-white/90" :placeholder="ot('planning.notesPlaceholder')" x-model="planningNewSchedule.notes_public">
              <button type="button" class="btn border-0 text-white" style="background: linear-gradient(135deg, #0f766e, #115e59);" @click="addPlanningScheduleEntry()" x-text="ot('planning.add')"></button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="office-summary-grid" x-show="activeTab === 'history'" x-cloak>
      <div class="space-y-4">
        <template x-if="!officeMatches.length">
          <article class="office-panel rounded-[28px] p-8 text-center text-slate-500">
            <span x-text="ot('history.empty')"></span>
          </article>
        </template>
        <template x-for="match in officeMatches" :key="`${match.source || 'match'}-${match.id}`">
          <article class="office-panel office-history-card">
            <div class="space-y-4">
              <div class="flex items-center justify-between gap-3 flex-wrap">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="office-chip" :class="officePhaseTone(match)" x-text="officeMatchPhase(match)"></span>
                  <span class="text-sm text-slate-500" x-text="formatOfficeMatchTime(match)"></span>
                </div>
                <button type="button" class="btn btn-sm btn-outline bg-white/80" @click="startOfficeEdit(match)" x-text="ot('history.editResult')"></button>
              </div>
              <div class="office-history-scoreboard">
                <div class="hm-scoreboard" aria-hidden="true">
                  <div class="hm-player" :class="{ 'hm-player--winner': officeMatchWinner(match) === 'A' }">
                    <span class="hm-winner-mark" x-show="officeMatchWinner(match) === 'A'" aria-hidden="true"></span>
                    <span class="hm-winner-mark hm-winner-mark--empty" x-show="officeMatchWinner(match) !== 'A'" aria-hidden="true"></span>
                    <span class="hm-player-name" x-text="match.player1_name || '-' "></span>
                    <span class="hm-sets">
                      <template x-for="(set, i) in officeMatchSets(match)" :key="'oa-'+match.id+'-'+i">
                        <span class="hm-set-cell" :class="{ 'hm-set-cell--won': set.a > set.b }">
                          <span x-text="set.a"></span><sup class="hm-tb" x-show="set.tb !== null && !set.isSuperTB && set.a < set.b" x-text="set.tb"></sup>
                        </span>
                      </template>
                    </span>
                  </div>
                  <div class="hm-player" :class="{ 'hm-player--winner': officeMatchWinner(match) === 'B' }">
                    <span class="hm-winner-mark" x-show="officeMatchWinner(match) === 'B'" aria-hidden="true"></span>
                    <span class="hm-winner-mark hm-winner-mark--empty" x-show="officeMatchWinner(match) !== 'B'" aria-hidden="true"></span>
                    <span class="hm-player-name" x-text="match.player2_name || '-' "></span>
                    <span class="hm-sets">
                      <template x-for="(set, i) in officeMatchSets(match)" :key="'ob-'+match.id+'-'+i">
                        <span class="hm-set-cell" :class="{ 'hm-set-cell--won': set.b > set.a }">
                          <span x-text="set.b"></span><sup class="hm-tb" x-show="set.tb !== null && !set.isSuperTB && set.b < set.a" x-text="set.tb"></sup>
                        </span>
                      </template>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </template>
      </div>

      <aside class="space-y-4">
        <article class="office-panel rounded-[28px] p-6">
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('history.quickGroups')"></div>
          <div class="mt-4 space-y-3">
            <template x-for="group in officeGroups" :key="group.id">
              <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
                <div class="flex items-center justify-between gap-3">
                  <div>
                    <div class="font-semibold text-slate-800" x-text="officeDisplayLabel(group.name)"></div>
                    <div class="text-sm text-slate-500" x-text="officeDisplayLabel(group.category) || ot('history.defaultGroup')"></div>
                  </div>
                  <span class="office-chip" :class="group.complete ? 'office-chip-group' : 'office-chip-neutral'" x-text="groupCompletionLabel(group)"></span>
                </div>
              </div>
            </template>
          </div>
        </article>
      </aside>
    </section>

    <section class="mt-6" x-show="activeTab === 'progress'" x-cloak>
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        <template x-for="group in officeGroups" :key="group.id">
          <article class="office-panel rounded-[28px] p-6">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('progress.group')"></div>
                <h2 class="mt-2 text-2xl font-semibold" x-text="officeDisplayLabel(group.name)"></h2>
                <p class="mt-1 text-sm text-slate-500" x-text="officeDisplayLabel(group.category) || ot('progress.groupPhase')"></p>
              </div>
              <span class="office-chip" :class="group.complete ? 'office-chip-group' : 'office-chip-knockout'" x-text="groupCompletionLabel(group)"></span>
            </div>
            <div class="mt-5 grid grid-cols-3 gap-3 text-center">
              <div class="rounded-2xl bg-white/70 p-3 border border-slate-200/80">
                <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('progress.plan')"></div>
                <div class="mt-2 text-2xl font-semibold" x-text="group.expected_matches"></div>
              </div>
              <div class="rounded-2xl bg-white/70 p-3 border border-slate-200/80">
                <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('progress.done')"></div>
                <div class="mt-2 text-2xl font-semibold" x-text="group.finished_matches"></div>
              </div>
              <div class="rounded-2xl bg-white/70 p-3 border border-slate-200/80">
                <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('progress.left')"></div>
                <div class="mt-2 text-2xl font-semibold" x-text="group.remaining_matches"></div>
              </div>
            </div>
            <div class="mt-5 text-sm text-slate-600" x-text="ot('progress.players')"></div>
            <div class="mt-3 flex flex-wrap gap-2">
              <template x-for="player in group.players || []" :key="player.id || player.name">
                <span class="px-3 py-2 rounded-full bg-white/80 border border-slate-200/80 text-sm text-slate-700" x-text="player.name"></span>
              </template>
            </div>
          </article>
        </template>
      </div>
    </section>

    <section class="mt-6 space-y-5" x-show="activeTab === 'knockout'" x-cloak>
      <div class="grid gap-4 md:grid-cols-3">
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('knockout.generated')"></div>
          <div class="mt-2 text-3xl font-semibold" x-text="officeKnockout.expected_matches || 0"></div>
        </article>
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('knockout.ready')"></div>
          <div class="mt-2 text-3xl font-semibold" x-text="officeKnockout.ready_matches || 0"></div>
        </article>
        <article class="office-stat">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('knockout.finished')"></div>
          <div class="mt-2 text-3xl font-semibold" x-text="officeKnockout.finished_matches || 0"></div>
        </article>
      </div>

      <template x-if="!officeKnockoutMatches.length">
        <article class="office-panel rounded-[28px] p-8 text-center text-slate-500">
          <span x-text="ot('knockout.empty')"></span>
        </article>
      </template>

      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        <template x-for="slot in officeKnockoutMatches" :key="'office_knockout_'+slot.slot_id">
          <article class="office-panel rounded-[28px] p-6">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="office-chip office-chip-knockout" x-text="officeDisplayLabel(slot.phase) || ot('knockout.defaultPhase')"></span>
                  <span class="office-chip" :class="slot.winner_name ? 'office-chip-group' : (slot.ready ? 'office-chip-knockout' : 'office-chip-neutral')" x-text="officeKnockoutStatusLabel(slot)"></span>
                </div>
                <div class="mt-3 text-sm text-slate-500">
                  <span x-text="formatOfficeScheduleDay(slot)"></span>
                  <span x-show="slot.scheduled_time"> · <span x-text="slot.scheduled_time"></span></span>
                  <span> · </span><span x-text="officeScheduleCourtLabel(slot)"></span>
                </div>
              </div>
              <span class="text-sm text-slate-400" x-text="'#' + (slot.position || 1)"></span>
            </div>

            <div class="mt-5 rounded-2xl border border-slate-200/80 bg-white/70 p-4 space-y-3">
              <div class="flex items-center justify-between gap-3">
                <span class="font-semibold text-slate-800" x-text="slot.player1_name || ot('knockout.previousRoundWinner')"></span>
                <span class="office-chip" x-show="slot.winner_name === slot.player1_name" x-text="ot('knockout.winShort')"></span>
              </div>
              <div class="flex items-center justify-between gap-3">
                <span class="font-semibold text-slate-800" x-text="slot.player2_name || ot('knockout.previousRoundWinner')"></span>
                <span class="office-chip" x-show="slot.winner_name === slot.player2_name" x-text="ot('knockout.winShort')"></span>
              </div>
            </div>

            <div class="mt-4 text-sm text-slate-600" x-show="slot.score_text">
              <span x-text="ot('knockout.score')"></span> <span class="font-semibold" x-text="slot.score_text"></span>
            </div>
            <div class="mt-4 text-sm text-slate-500" x-show="!slot.ready && !slot.winner_name" x-text="ot('knockout.waitingPreviousRound')"></div>

            <div class="mt-5 flex justify-end gap-2">
              <button type="button" class="btn btn-outline bg-white/80" x-show="slot.match_id" @click="startOfficeEditFromKnockout(slot)" x-text="ot('knockout.editResult')"></button>
              <button type="button" class="btn border-0 text-white" style="background: linear-gradient(135deg, #0f766e, #115e59);" x-show="officeKnockoutCanAddResult(slot)" @click="openAddKnockoutResult(slot)" x-text="ot('knockout.addResult')"></button>
            </div>
          </article>
        </template>
      </div>
    </section>
  </main>

  <div class="office-modal-backdrop" x-show="addMatchOpen" x-transition.opacity x-cloak>
    <section class="office-modal office-panel" @click.away="closeAddMatchModal()">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('modals.newResult')"></div>
          <h2 class="mt-2 text-3xl font-semibold" x-text="officeNewMatch.mode === 'knockout' ? ot('modals.addKnockoutResult') : ot('modals.addGroupResult')"></h2>
        </div>
        <button type="button" class="btn btn-sm btn-ghost" @click="closeAddMatchModal()" x-text="ot('modals.close')"></button>
      </div>

      <div class="mt-6 grid gap-4 md:grid-cols-2">
        <label class="form-control" x-show="officeNewMatch.mode === 'group'">
          <span class="label-text font-semibold mb-2" x-text="ot('modals.group')"></span>
          <select class="select select-bordered bg-white/90" x-model="officeNewMatch.group_id" @change="onOfficeGroupChanged()">
            <template x-for="group in officeGroups" :key="group.id">
              <option :value="group.id" x-text="officeDisplayLabel(group.name)"></option>
            </template>
          </select>
        </label>
        <label class="form-control">
          <span class="label-text font-semibold mb-2" x-text="ot('modals.walkover')"></span>
          <input type="checkbox" class="toggle toggle-success mt-3" x-model="officeNewMatch.walkover">
        </label>

        <div class="md:col-span-2 rounded-2xl border border-slate-200/80 bg-white/70 p-4" x-show="officeNewMatch.mode === 'knockout'">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('modals.bracketSlot')"></div>
          <div class="mt-2 text-lg font-semibold" x-text="officeDisplayLabel(officeNewMatch.phase) || ot('knockout.defaultPhase')"></div>
          <div class="mt-1 text-sm text-slate-500" x-text="`${officeNewMatch.player1_name || '-'} ${ot('versus')} ${officeNewMatch.player2_name || '-'}`"></div>
        </div>

        <label class="form-control" x-show="officeNewMatch.mode === 'group'">
          <span class="label-text font-semibold mb-2" x-text="ot('modals.playerA')"></span>
          <select class="select select-bordered bg-white/90" x-model="officeNewMatch.player1_name">
            <template x-for="player in officeGroupPlayers()" :key="player.name">
              <option :value="player.name" x-text="player.name"></option>
            </template>
          </select>
        </label>
        <label class="form-control" x-show="officeNewMatch.mode === 'group'">
          <span class="label-text font-semibold mb-2" x-text="ot('modals.playerB')"></span>
          <select class="select select-bordered bg-white/90" x-model="officeNewMatch.player2_name">
            <template x-for="player in officeGroupPlayers()" :key="player.name">
              <option :value="player.name" x-text="player.name"></option>
            </template>
          </select>
        </label>
      </div>

      <div class="mt-5" x-show="officeNewMatch.walkover">
        <label class="form-control">
          <span class="label-text font-semibold mb-2" x-text="ot('modals.walkoverWinner')"></span>
          <select class="select select-bordered bg-white/90" x-model="officeNewMatch.winner_name">
            <option value="" x-text="ot('modals.choose')"></option>
            <option :value="officeNewMatch.player1_name" x-text="officeNewMatch.player1_name"></option>
            <option :value="officeNewMatch.player2_name" x-text="officeNewMatch.player2_name"></option>
          </select>
        </label>
      </div>

      <div class="mt-6">
        <div class="text-sm font-semibold text-slate-700 mb-3" x-text="ot('modals.sets')"></div>
        <div class="office-match-grid">
          <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
            <div class="text-sm font-semibold mb-3" x-text="ot('modals.set1')"></div>
            <div class="grid grid-cols-2 gap-3">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.set1_p1" placeholder="A">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.set1_p2" placeholder="B">
            </div>
          </div>
          <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
            <div class="text-sm font-semibold mb-3" x-text="ot('modals.set2')"></div>
            <div class="grid grid-cols-2 gap-3">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.set2_p1" placeholder="A">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.set2_p2" placeholder="B">
            </div>
          </div>
          <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4 md:col-span-2">
            <div class="text-sm font-semibold mb-3" x-text="ot('modals.superTiebreak')"></div>
            <div class="grid grid-cols-2 gap-3">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.stb_p1" placeholder="A">
              <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeNewMatch.stb_p2" placeholder="B">
            </div>
          </div>
        </div>
      </div>

      <div class="mt-8 flex justify-end gap-3">
        <button type="button" class="btn btn-ghost" @click="closeAddMatchModal()" x-text="ot('modals.cancel')"></button>
        <button type="button" class="btn border-0 text-white" style="background: linear-gradient(135deg, #0f766e, #115e59);" @click="addOfficeMatchResult()" x-text="ot('modals.saveResult')"></button>
      </div>
    </section>
  </div>

  <div class="office-modal-backdrop" x-show="editMatchOpen" x-transition.opacity x-cloak>
    <section class="office-modal office-panel" @click.away="closeEditModal()">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="text-xs uppercase tracking-[0.24em] text-slate-500" x-text="ot('modals.correction')"></div>
          <h2 class="mt-2 text-3xl font-semibold" x-text="ot('modals.editMatchTitle')"></h2>
        </div>
        <button type="button" class="btn btn-sm btn-ghost" @click="closeEditModal()" x-text="ot('modals.close')"></button>
      </div>

      <template x-if="officeEditingMatch">
        <div class="mt-6 space-y-6">
          <div class="grid gap-4 md:grid-cols-2">
            <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('modals.playerA')"></div>
              <div class="mt-2 text-xl font-semibold" x-text="officeEditingMatch.player1_name"></div>
            </div>
            <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-400" x-text="ot('modals.playerB')"></div>
              <div class="mt-2 text-xl font-semibold" x-text="officeEditingMatch.player2_name"></div>
            </div>
          </div>

          <div class="office-match-grid">
            <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
              <div class="text-sm font-semibold mb-3" x-text="ot('modals.set1')"></div>
              <div class="grid grid-cols-2 gap-3">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.set1_p1">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.set1_p2">
              </div>
            </div>
            <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
              <div class="text-sm font-semibold mb-3" x-text="ot('modals.set2')"></div>
              <div class="grid grid-cols-2 gap-3">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.set2_p1">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.set2_p2">
              </div>
            </div>
            <div class="rounded-2xl border border-slate-200/80 bg-white/70 p-4 md:col-span-2">
              <div class="text-sm font-semibold mb-3" x-text="ot('modals.superTiebreak')"></div>
              <div class="grid grid-cols-2 gap-3">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.stb_p1">
                <input type="number" min="0" class="input input-bordered bg-white/90" x-model="officeEditingMatch.stb_p2">
              </div>
            </div>
          </div>
        </div>
      </template>

      <div class="mt-8 flex justify-end gap-3">
        <button type="button" class="btn btn-ghost" @click="closeEditModal()" x-text="ot('modals.cancel')"></button>
        <button type="button" class="btn border-0 text-white" style="background: linear-gradient(135deg, #c2410c, #9a3412);" @click="saveOfficeMatchEdit()" x-text="ot('modals.saveCorrection')"></button>
      </div>
    </section>
  </div>

  <script type="module" src="/src/office.js"></script>
</body>
</html>
