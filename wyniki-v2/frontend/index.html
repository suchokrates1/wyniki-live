<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyniki tenisowe</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎾</text></svg>">
    <meta name="description" content="Wyniki tenisowe na zywo">
    <script defer src="https://stats.dawidsuchodolski.pl/script.js" data-website-id="b49919d3-6628-40cc-9213-72ec52409e28"></script>
</head>
<body>
    <div x-data="tennisApp" x-cloak class="wrap" x-effect="document.title = tr().pageTitle || 'Wyniki tenisowe – na zywo'; document.documentElement.lang = tr().htmlLang || lang || 'pl'">
        <a href="#main" class="skip-link" x-text="uiText().skipToContent || 'Skip to main content'">Skip to main content</a>
        
        <!-- Header -->
        <header class="header">
            <div class="header-bar">
                <h1 class="header-title">
                    <span x-text="uiText().appName || (tr().pageTitle || 'Wyniki tenisowe')">Wyniki tenisowe</span>
                    <span x-show="hasActiveCourts()" class="live-badge" x-text="tr().liveBadge || 'LIVE'">LIVE</span>
                </h1>
                <div class="header-actions">
                    <label class="sr-only" for="langSelect" x-text="uiText().languageSelect || 'Wybierz jezyk'">Wybierz jezyk</label>
                    <select id="langSelect" class="lang-select" x-model="lang" @change="onLangChange()">
                        <option value="pl">Polski</option>
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                    </select>
                    <button class="dark-mode-toggle" @click="toggleDarkMode()" :aria-label="darkMode ? (tr().darkModeTooltip?.light || 'Zmień na tryb jasny') : (tr().darkModeTooltip?.dark || 'Zmień na tryb ciemny')" :title="darkMode ? (tr().darkModeTooltip?.light || 'Zmień na tryb jasny') : (tr().darkModeTooltip?.dark || 'Zmień na tryb ciemny')">
                        <span class="dark-mode-toggle__icon" aria-hidden="true" x-text="darkMode ? '☀️' : '🌙'"></span>
                    </button>
                </div>
            </div>
        </header>

        <div
            class="tournament-info-banner"
            x-show="tournamentQuickInfo?.message"
            x-cloak
            role="region"
            :aria-label="acc().tournamentQuickInfoLabel || 'Komunikat turniejowy'"
            aria-live="polite"
        >
            <div class="tournament-info-banner__inner">
                <span class="tournament-info-banner__icon" aria-hidden="true">ℹ️</span>
                <p class="tournament-info-banner__text" x-text="tournamentQuickInfo?.message"></p>
            </div>
        </div>

        <!-- Tab Navigation -->
        <nav class="tab-bar" role="tablist" :aria-label="tr().tabs?.navLabel || 'Główna nawigacja'">
                <button class="tab-btn" role="tab" :aria-selected="activeTab === 'live'" :class="{ 'tab-btn--active': activeTab === 'live' }" @click="openMainTab('live')"
                    x-text="tr().tabs?.live || 'Na żywo'"></button>
                <button class="tab-btn" role="tab" :aria-selected="activeTab === 'tournaments'" :class="{ 'tab-btn--active': activeTab === 'tournaments' }" @click="openMainTab('tournaments')"
                    x-text="tr().tabs?.tournaments || 'Historia'"></button>
                <button class="tab-btn" role="tab" :aria-selected="activeTab === 'players'" :class="{ 'tab-btn--active': activeTab === 'players' }" @click="openMainTab('players')"
                    x-text="tr().tabs?.players || 'Zawodnicy'"></button>
        </nav>
        
        <!-- Loading State -->
        <div x-show="loading" class="loading-state" role="status">
            <span class="spinner spinner--large"></span>
            <span class="sr-only" x-text="t('loading')">Ładowanie wyników...</span>
        </div>
        
        <!-- Error State -->
        <div x-show="error && !loading && activeTab === 'live'" class="error-bar" role="alert" aria-live="assertive">
            <span class="error" x-text="error"></span>
        </div>

        <!-- Main content -->
        <main id="main" tabindex="-1">

            <!-- ======= TAB: LIVE ======= -->
            <div x-show="activeTab === 'live'">

            <!-- Active tournament name -->
            <h2 class="live-tournament-name" x-show="tournamentName" x-text="tournamentName"></h2>

            <!-- Live sub-navigation cards -->
            <div class="live-subnav" role="tablist" :aria-label="tr().liveSub?.navLabel || 'Podzakładki Na żywo'">
                <button class="live-subnav__card" role="tab" :aria-selected="liveSubTab === 'scores'" :class="{ 'live-subnav__card--active': liveSubTab === 'scores' }" @click="openLiveSubTab('scores')">
                    <span class="live-subnav__icon" aria-hidden="true">🎾</span>
                    <span class="live-subnav__label" x-text="tr().liveSub?.scores || 'Wyniki live'"></span>
                </button>
                <button class="live-subnav__card" role="tab" :aria-selected="liveSubTab === 'bracket'" :class="{ 'live-subnav__card--active': liveSubTab === 'bracket' }" @click="openLiveSubTab('bracket')">
                    <span class="live-subnav__icon" aria-hidden="true">🏆</span>
                    <span class="live-subnav__label" x-text="tr().liveSub?.bracket || 'Drabinka'"></span>
                </button>
                <button class="live-subnav__card" role="tab" :aria-selected="liveSubTab === 'schedule'" :class="{ 'live-subnav__card--active': liveSubTab === 'schedule' }" @click="openLiveSubTab('schedule')">
                    <span class="live-subnav__icon" aria-hidden="true">📅</span>
                    <span class="live-subnav__label" x-text="tr().liveSub?.schedule || 'Terminarz'"></span>
                </button>
                <button class="live-subnav__card" role="tab" :aria-selected="liveSubTab === 'history'" :class="{ 'live-subnav__card--active': liveSubTab === 'history' }" @click="openLiveSubTab('history')">
                    <span class="live-subnav__icon" aria-hidden="true">📋</span>
                    <span class="live-subnav__label" x-text="tr().liveSub?.history || 'Historia'"></span>
                </button>
            </div>

            <!-- SUB: Live Scores -->
            <div x-show="liveSubTab === 'scores'" role="tabpanel">

            <!-- Quick court navigation (screen readers) -->
            <nav x-show="getCourtIds().length > 0" :aria-label="t('navLabel')" class="sr-only">
                <ul>
                    <template x-for="courtId in getCourtIds()" :key="'nav-'+courtId">
                        <li><a :href="'#kort-'+courtId" x-text="getCourtDisplayLabel(courtId)"></a></li>
                    </template>
                </ul>
            </nav>

            <!-- Empty State -->
            <div x-show="!loading && getCourtIds().length === 0" class="empty-state" role="status">
                <div class="empty-state__icon" aria-hidden="true">🎾</div>
                <h2 class="empty-state__title" x-text="t('emptyTitle')">Brak aktywnych kortów</h2>
                <p class="empty-state__text" x-text="t('emptyText')">Skonfiguruj korty w panelu administratora</p>
            </div>
            
            <!-- Courts Grid -->
            <div x-show="!loading" class="grid">
                <template x-for="courtId in getCourtIds()" :key="courtId">
                    <section class="card" :id="'kort-'+courtId" :aria-labelledby="'heading-'+courtId">
                        
                        <!-- Card Header -->
                        <div class="card-head">
                            <h2 :id="'heading-'+courtId"
                                :aria-label="getHeadingAria(courtId)">
                                <span class="court-label" x-text="getCourtDisplayLabel(courtId)"></span>:
                                <span class="match-title">
                                    <span class="match-player" x-text="getPlayerName(courtId, 'A')"></span>
                                    <span class="match-versus">
                                        <span aria-hidden="true" x-text="tr().versus || 'vs'"></span>
                                        <span class="sr-only" x-text="acc().versus"></span>
                                    </span>
                                    <span class="match-player" x-text="getPlayerName(courtId, 'B')"></span>
                                </span>
                                <span x-show="isMatchActive(courtId)" class="live-badge" x-text="tr().liveBadge || 'LIVE'"></span>
                            </h2>
                        </div>

                        <!-- Scoreboard -->
                        <div class="score-wrapper">
                            <!-- Tiebreak labels (above scoreboard) -->
                            <div class="score-labels">
                                <div class="score-label score-label-tb"
                                     :class="{ 'is-visible': isTiebreak(courtId) && !isSuperTiebreak(courtId) }"
                                     aria-hidden="true" x-text="tr().tieBreakLabel || 'TB'"></div>
                                <div class="score-label score-label-stb"
                                     :class="{ 'is-visible': isSuperTiebreak(courtId) }"
                                     aria-hidden="true" x-text="tr().superTieBreakLabel || 'STB'"></div>
                            </div>

                            <!-- Score table (visual, hidden from screen readers) -->
                            <dl class="score-list" aria-hidden="true">
                                <!-- Player A -->
                                <div class="score-row" data-side="A">
                                    <dt class="player-cell">
                                        <span class="player-flag has-image" aria-hidden="true"
                                              x-show="courts[courtId]?.A?.flag_url || courts[courtId]?.A?.flag_code"
                                              :style="'background-image:url('+(courts[courtId]?.A?.flag_url || codeToFlag(courts[courtId]?.A?.flag_code))+')'">
                                        </span>
                                        <span class="player-name" :id="'k'+courtId+'-name-A'" x-text="getPlayerName(courtId, 'A')"></span>
                                        <template x-if="courts[courtId]?.serve === 'A'">
                                            <span class="serve-indicator" aria-hidden="true"><img src="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 36 36%27%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27%23C6E953%27/%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 11c4 8 14 14 26 6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 25c6-8 16-14 26-6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3C/svg%3E" alt="" style="width:14px;height:14px;"></span>
                                        </template>
                                    </dt>
                                    <dd class="metric points" :aria-labelledby="'k'+courtId+'-label-points k'+courtId+'-name-A'">
                                        <span class="metric-label" :id="'k'+courtId+'-label-points'"
                                              x-text="getPointsLabel(courtId)"></span>
                                        <span class="metric-value points"
                                              :id="'k'+courtId+'-pts-A'"
                                              :class="{ 'is-tiebreak': isTiebreak(courtId) }"
                                              x-text="getDisplayPoints(courtId, 'A')"></span>
                                    </dd>
                                    <template x-for="setIdx in getSetIndices(courtId)" :key="'sA'+setIdx">
                                        <dd class="metric" :class="'set-'+setIdx"
                                            :aria-labelledby="'k'+courtId+'-label-set'+setIdx+' k'+courtId+'-name-A'">
                                            <span class="metric-label" :id="'k'+courtId+'-label-set'+setIdx"
                                                  x-text="t('setLabel', {number: setIdx})"
                                                  x-show="$el.closest('.score-row[data-side=A]')"></span>
                                            <span class="metric-value set"
                                                  :id="'k'+courtId+'-s'+setIdx+'-A'"
                                                  :class="{ 'is-active': courts[courtId]?.current_set == setIdx }">
                                                <span x-text="getSetScore(courtId, 'A', setIdx)"></span><sup class="tb-sup" x-show="getTiebreakInfo(courtId, setIdx) !== null && parseInt(getSetScore(courtId, 'A', setIdx)) < parseInt(getSetScore(courtId, 'B', setIdx))" x-text="getTiebreakInfo(courtId, setIdx)"></sup>
                                            </span>
                                        </dd>
                                    </template>
                                </div>

                                <!-- Player B -->
                                <div class="score-row" data-side="B">
                                    <dt class="player-cell">
                                        <span class="player-flag has-image" aria-hidden="true"
                                              x-show="courts[courtId]?.B?.flag_url || courts[courtId]?.B?.flag_code"
                                              :style="'background-image:url('+(courts[courtId]?.B?.flag_url || codeToFlag(courts[courtId]?.B?.flag_code))+')'">
                                        </span>
                                        <span class="player-name" :id="'k'+courtId+'-name-B'" x-text="getPlayerName(courtId, 'B')"></span>
                                        <template x-if="courts[courtId]?.serve === 'B'">
                                            <span class="serve-indicator" aria-hidden="true"><img src="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 36 36%27%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27%23C6E953%27/%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 11c4 8 14 14 26 6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 25c6-8 16-14 26-6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3C/svg%3E" alt="" style="width:14px;height:14px;"></span>
                                        </template>
                                    </dt>
                                    <dd class="metric points" :aria-labelledby="'k'+courtId+'-label-points k'+courtId+'-name-B'">
                                        <span class="metric-value points"
                                              :id="'k'+courtId+'-pts-B'"
                                              :class="{ 'is-tiebreak': isTiebreak(courtId) }"
                                              x-text="getDisplayPoints(courtId, 'B')"></span>
                                    </dd>
                                    <template x-for="setIdx in getSetIndices(courtId)" :key="'sB'+setIdx">
                                        <dd class="metric" :class="'set-'+setIdx"
                                            :aria-labelledby="'k'+courtId+'-label-set'+setIdx+' k'+courtId+'-name-B'">
                                            <span class="metric-value set"
                                                  :id="'k'+courtId+'-s'+setIdx+'-B'"
                                                  :class="{ 'is-active': courts[courtId]?.current_set == setIdx }">
                                                <span x-text="getSetScore(courtId, 'B', setIdx)"></span><sup class="tb-sup" x-show="getTiebreakInfo(courtId, setIdx) !== null && parseInt(getSetScore(courtId, 'B', setIdx)) < parseInt(getSetScore(courtId, 'A', setIdx))" x-text="getTiebreakInfo(courtId, setIdx)"></sup>
                                            </span>
                                        </dd>
                                    </template>
                                </div>
                            </dl>
                        </div>

                        <!-- Screen reader summary (hidden visually, read by screen readers) -->
                        <p class="sr-only score-summary" :id="'k'+courtId+'-summary'" aria-live="polite"
                           x-text="getScoreSummary(courtId)"></p>

                        <!-- Match info footer -->
                        <div class="card-footer" x-show="isMatchActive(courtId)">
                            <span class="match-time" x-show="courts[courtId]?.match_time?.seconds">
                                <span aria-hidden="true">🕒</span> <span x-text="formatTime(courts[courtId]?.match_time?.seconds)"></span>
                            </span>
                            <span class="match-set" x-text="getCurrentSetLabel(courtId)"></span>
                        </div>
                    </section>
                </template>
            </div>
            </div><!-- end SUB: scores -->

            <!-- SUB: Live Bracket (active tournament) -->
            <div x-show="liveSubTab === 'bracket'" role="tabpanel">
                <!-- Loading -->
                <div x-show="bracketLoading" class="loading-state" role="status">
                    <span class="spinner spinner--large"></span>
                </div>

                <!-- No bracket configured -->
                <div x-show="!bracketLoading && (!bracketData || !bracketData.groups || bracketData.groups.length === 0)" class="empty-state">
                    <div class="empty-state__icon">🏆</div>
                    <h2 class="empty-state__title" x-text="tr().bracket?.emptyTitle || 'Brak drabinki'"></h2>
                    <p class="empty-state__text" x-text="tr().bracket?.emptyText || 'Drabinka turniejowa nie została jeszcze skonfigurowana'"></p>
                </div>

                <!-- Bracket with category tabs -->
                <template x-if="bracketData && bracketData.groups && bracketData.groups.length > 0">
                    <div class="bracket-content">

                        <!-- Category sub-tabs -->
                        <div class="cat-tabs" role="tablist" :aria-label="tr().bracket?.categoryTabsLabel || 'Kategorie turniejowe'">
                            <template x-for="cat in bracketCategories()" :key="'ct-'+cat.name">
                                <button class="cat-tab"
                                        role="tab"
                                        :id="'cat-tab-'+cat.name.replace(/\s+/g,'-')"
                                        :aria-selected="bracketCategory === cat.name"
                                        :aria-controls="'cat-panel-'+cat.name.replace(/\s+/g,'-')"
                                        :class="{ 'cat-tab--active': bracketCategory === cat.name }"
                                        @click="selectLiveBracketCategory(cat.name)"
                                        x-text="bracketCategoryLabel(cat.name)">
                                </button>
                            </template>
                        </div>

                        <!-- Category panel -->
                        <template x-for="cat in bracketCategories()" :key="'cp-'+cat.name">
                            <div x-show="bracketCategory === cat.name"
                                 role="tabpanel"
                                 :id="'cat-panel-'+cat.name.replace(/\s+/g,'-')"
                                 :aria-labelledby="'cat-tab-'+cat.name.replace(/\s+/g,'-')">

                                <div class="bt-podium bt-podium--top" role="list" :aria-label="tr().bracket?.podiumLabel || 'Podium'" x-show="knockoutPodiumEntries(cat.knockout).length === 3">
                                    <template x-for="(entry, pi) in knockoutPodiumEntries(cat.knockout)" :key="'pod-top-'+cat.name+'-'+pi">
                                        <div class="bt-podium-item" :class="entry.cls" role="listitem">
                                            <span class="bt-podium-medal" x-text="entry.medal"></span>
                                            <span class="bt-podium-result">
                                                <strong x-text="resolveBracketName(entry.player)"></strong>
                                                <small x-text="entry.place + ' ' + (tr().playerProfile?.place || 'miejsce')"></small>
                                            </span>
                                        </div>
                                    </template>
                                </div>

                                <!-- Group tables (side by side if 2 groups) -->
                                <div class="bracket-groups" :class="{ 'bracket-groups--pair': cat.groups.length === 2 }">
                                    <template x-for="(group, gi) in cat.groups" :key="'g-'+cat.name+'-'+gi">
                                        <section class="bracket-group" :aria-label="group.name">
                                            <h3 class="bracket-group__title">
                                                <span x-text="group.name"></span>
                                            </h3>

                                            <!-- Standings table -->
                                            <table class="bracket-table" :aria-label="bracketGroupTableAriaLabel(group.name)">
                                                <thead>
                                                    <tr>
                                                        <th class="bt-pos" scope="col">#</th>
                                                        <th class="bt-name" scope="col" x-text="tr().bracket?.player || 'Zawodnik'"></th>
                                                        <th class="bt-stat" scope="col" :aria-label="tr().bracket?.legendWins || 'wygrane mecze'"><span aria-hidden="true" x-text="tr().bracket?.wins || 'W'"></span></th>
                                                        <th class="bt-stat" scope="col" :aria-label="tr().bracket?.legendLosses || 'przegrane mecze'"><span aria-hidden="true" x-text="tr().bracket?.losses || 'L'"></span></th>
                                                        <th class="bt-stat" scope="col" :aria-label="tr().bracket?.legendSets || 'sety wygrane do przegranych'"><span aria-hidden="true" x-text="tr().bracket?.setsHeader || 'S'"></span></th>
                                                        <th class="bt-stat" scope="col" :aria-label="tr().bracket?.legendGames || 'gemy wygrane do przegranych'"><span aria-hidden="true" x-text="tr().bracket?.gamesHeader || 'G'"></span></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="(row, ri) in groupStandingsRows(group, cat.groups)" :key="row._key || ('gs-'+cat.name+'-'+gi+'-'+ri)">
                                                        <tr :class="{ 'bt-qualify': !row._placeholder && ri < 2 && group.standings.length > 2, 'bt-row--placeholder': row._placeholder }" :aria-hidden="row._placeholder ? 'true' : 'false'">
                                                            <td class="bt-pos" x-text="row._placeholder ? '' : (ri + 1)"></td>
                                                            <td class="bt-name" x-text="row._placeholder ? '' : resolveBracketName(row.name)"></td>
                                                            <td class="bt-stat bt-stat--wins" x-text="row._placeholder ? '' : row.wins"></td>
                                                            <td class="bt-stat bt-stat--losses" x-text="row._placeholder ? '' : row.losses"></td>
                                                            <td class="bt-stat" x-text="row._placeholder ? '' : (row.sets_won + ':' + row.sets_lost)"></td>
                                                            <td class="bt-stat" x-text="row._placeholder ? '' : (row.games_won + ':' + row.games_lost)"></td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>

                                            <!-- Group matches -->
                                            <div class="bracket-matches" x-show="group.matches && group.matches.length > 0">
                                                <h4 class="bracket-matches__title" x-text="tr().bracket?.matchesTitle || 'Mecze grupowe'"></h4>
                                                <div class="bm-match-list">
                                                    <template x-for="(m, mi) in group.matches" :key="'gm-'+cat.name+'-'+gi+'-'+mi">
                                                        <table class="bm-scoreboard bm-scoreboard--group"
                                                            :aria-label="groupMatchAria(m, group.name, mi)">
                                                            <colgroup>
                                                                <col class="bm-col-name">
                                                                <col class="bm-col-set">
                                                                <col class="bm-col-set">
                                                                <col class="bm-col-set">
                                                            </colgroup>
                                                            <tbody>
                                                                <tr :class="{ 'bm-row--won': m.winner === m.player_a }">
                                                                    <td class="bm-name" x-text="resolveBracketName(m.player_a)"></td>
                                                                    <template x-for="(s, si) in padSets(m.sets)" :key="'gms1-'+mi+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <template x-if="s.played">
                                                                                <span>
                                                                                    <span x-text="s.stb ? '['+s.g1+']' : s.g1"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g1 < s.g2" x-text="s.tb"></sup>
                                                                                </span>
                                                                            </template>
                                                                        </td>
                                                                    </template>
                                                                </tr>
                                                                <tr :class="{ 'bm-row--won': m.winner === m.player_b }">
                                                                    <td class="bm-name" x-text="resolveBracketName(m.player_b)"></td>
                                                                    <template x-for="(s, si) in padSets(m.sets)" :key="'gms2-'+mi+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <template x-if="s.played">
                                                                                <span>
                                                                                    <span x-text="s.stb ? '['+s.g2+']' : s.g2"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g2 < s.g1" x-text="s.tb"></sup>
                                                                                </span>
                                                                            </template>
                                                                        </td>
                                                                    </template>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </template>
                                                </div>
                                            </div>
                                        </section>
                                    </template>
                                </div>

                                <div class="bracket-legend" role="group" :aria-labelledby="'bracket-legend-title-' + cat.name.replace(/\s+/g, '-')">
                                    <p class="bracket-legend__title" :id="'bracket-legend-title-' + cat.name.replace(/\s+/g, '-')" x-text="tr().bracket?.legendTitle || 'Legenda tabeli'"></p>
                                    <dl class="bracket-legend__list">
                                        <template x-for="item in tableLegendItems()" :key="'legend-'+cat.name+'-'+item.term">
                                            <dt x-text="item.term"></dt>
                                            <dd x-text="item.description"></dd>
                                        </template>
                                    </dl>
                                </div>

                                <!-- Bracket tree (only for categories with knockout) -->
                                <template x-if="cat.knockout.length > 0">
                                    <section class="bracket-tree" :aria-label="bracketTreeAriaLabel(cat.name)">
                                        <h3 class="bracket-tree__title" x-text="tr().bracket?.knockoutTitle || 'Faza pucharowa'">Faza pucharowa</h3>

                                        <div class="bt-ladder">
                                            <template x-for="(ko, ki) in cat.knockout" :key="'ko-'+cat.name+'-'+ki">
                                                <div class="bt-round" :class="knockoutPhaseClass(ko.phase)">

                                                            </tr>
                                                        </template>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </template>
                                    </div>
                                </article>
                            </template>
                        </div>
                    </section>
                </div>

            </div><!-- end TAB: TOURNAMENTS -->

            <!-- ======= TAB: PLAYERS ======= -->
            <div x-show="activeTab === 'players'">
                <h2 x-show="!selectedPlayerId" class="section-heading" x-text="tr().playerSection?.title || 'Baza zawodników'"></h2>

                <!-- Search + filters (hidden when profile is open) -->
                <div x-show="!selectedPlayerId" class="player-filters">
                    <label for="player-search-input" class="sr-only" x-text="tr().playerSection?.searchPlaceholder || 'Szukaj zawodnika'"></label>
                    <input type="search" id="player-search-input" class="player-search"
                           :placeholder="tr().playerSection?.searchPlaceholder || 'Szukaj zawodnika...'"
                           x-model="playerSearch"
                           @input="filterPlayers()">
                    <div class="player-filter-btns" role="group" :aria-label="tr().playerSection?.genderFilter || 'Filtr płci'">
                        <button class="filter-btn" :class="{ 'filter-btn--active': playerGender === '' }" @click="playerGender = ''; filterPlayers()"
                                x-text="tr().playerSection?.all || 'Wszyscy'"></button>
                        <button class="filter-btn" :class="{ 'filter-btn--active': playerGender === 'M' }" @click="playerGender = 'M'; filterPlayers()"
                                x-text="tr().playerSection?.men || 'Mężczyźni'"></button>
                        <button class="filter-btn" :class="{ 'filter-btn--active': playerGender === 'F' }" @click="playerGender = 'F'; filterPlayers()"
                                x-text="tr().playerSection?.women || 'Kobiety'"></button>
                    </div>
                </div>
                <div x-show="!selectedPlayerId" class="player-filters player-filters--row2">
                    <label for="player-country-select" class="sr-only" x-text="tr().playerSection?.allCountries || 'Kraj'"></label>
                    <select id="player-country-select" class="player-dropdown" x-model="playerCountry" @change="filterPlayers()">
                        <option value="" x-text="(tr().playerSection?.allCountries || 'Wszystkie kraje') + ' (' + allPlayers.length + ')'"></option>
                        <template x-for="opt in playerCountryOptions()" :key="'pc-'+opt.code">
                            <option :value="opt.code" x-text="opt.code + ' (' + opt.count + ')'"></option>
                        </template>
                    </select>
                    <label for="player-category-select" class="sr-only" x-text="tr().playerSection?.allCategories || 'Kategoria'"></label>
                    <select id="player-category-select" class="player-dropdown" x-model="playerCategory" @change="filterPlayers()">
                        <option value="" x-text="(tr().playerSection?.allCategories || 'Wszystkie kategorie') + ' (' + allPlayers.length + ')'"></option>
                        <template x-for="opt in playerCategoryOptions()" :key="'pcat-'+opt.name">
                            <option :value="opt.name" x-text="opt.name + ' (' + opt.count + ')'"></option>
                        </template>
                    </select>
                </div>

                <!-- Players list -->
                <div class="player-list" x-show="!selectedPlayerId">
                    <template x-for="p in filteredPlayers" :key="'pl-'+(p.global_player_id || p.id)">
                        <div class="player-card player-card--clickable" @click="openPlayerProfile(p.global_player_id || p.id, !!p.global_player_id)" role="button" tabindex="0" @keydown.enter="openPlayerProfile(p.global_player_id || p.id, !!p.global_player_id)" :aria-label="p.name + ' – ' + p.category + ' – ' + p.matches_played + ' ' + (tr().playerSection?.matchesPlayed || 'meczów')">
                            <div class="player-card__main">
                                <img class="player-card__flag" x-show="p.country" :src="codeToFlag(p.country)" :alt="p.country" width="20" height="15">
                                <span class="player-card__name" x-text="p.name"></span>
                                <span class="player-card__cat" x-show="formatPlayerClassification(p.category)" x-text="formatPlayerClassification(p.category)"></span>
                                <span class="player-card__gender" x-show="p.gender" x-text="p.gender === 'M' ? (tr().playerSection?.genderShortM || 'M') : (tr().playerSection?.genderShortF || 'K')"></span>
                            </div>
                            <div class="player-card__stats">
                                <span class="player-card__stat">
                                    <span class="player-card__stat-val" x-text="p.matches_played"></span>
                                    <span class="player-card__stat-label" x-text="tr().playerSection?.matchesPlayed || 'meczów'"></span>
                                </span>
                                <span class="player-card__stat player-card__stat--wins">
                                    <span class="player-card__stat-val" x-text="p.wins"></span>
                                    <span class="player-card__stat-label" x-text="tr().playerSection?.winsLabel || 'W'"></span>
                                </span>
                                <span class="player-card__stat player-card__stat--losses">
                                    <span class="player-card__stat-val" x-text="p.losses"></span>
                                    <span class="player-card__stat-label" x-text="tr().playerSection?.lossesLabel || 'L'"></span>
                                </span>
                            </div>
                        </div>
                    </template>
                    <div x-show="filteredPlayers.length === 0 && !playersLoading" class="empty-state">
                        <p x-text="tr().playerSection?.noResults || 'Brak wyników'"></p>
                    </div>
                    <div x-show="playersLoading" class="loading-state"><span class="spinner spinner--large"></span></div>
                </div>

                <!-- Player Profile View -->
                <div x-show="selectedPlayerId" class="pp">
                    <!-- Back button -->
                    <button class="pp-back" @click="closePlayerProfile()" :aria-label="tr().playerProfile?.back || 'Powrót do listy zawodników'">
                        <span aria-hidden="true">←</span> <span x-text="tr().playerProfile?.back || 'Powrót do listy'"></span>
                    </button>

                    <div x-show="playerProfileLoading" class="loading-state"><span class="spinner spinner--large"></span></div>

                    <template x-if="playerProfile && !playerProfileLoading">
                        <div>
                            <!-- Header: Avatar + Info -->
                            <div class="pp-header">
                                <div class="pp-avatar">
                                    <img x-show="playerProfile.player.photo_url" :src="playerProfile.player.photo_url" class="pp-avatar__photo" :alt="playerProfile.player.full_name" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
                                    <img x-show="!playerProfile.player.photo_url && playerProfile.player.country" :src="codeToFlag(playerProfile.player.country)" alt="" class="pp-avatar__flag">
                                    <span x-show="!playerProfile.player.photo_url" class="pp-avatar__initials" aria-hidden="true" x-text="(playerProfile.player.first_name?.[0] || '') + (playerProfile.player.last_name?.[0] || '')"></span></span>
                                </div>
                                <div class="pp-info">
                                    <h2 class="pp-info__name" x-text="playerProfile.player.full_name"></h2>
                                    <div class="pp-info__details">
                                        <span x-show="formatPlayerClassification(playerProfile.player.category)" class="pp-badge pp-badge--cat" x-text="formatPlayerClassification(playerProfile.player.category)"></span>
                                        <span x-show="playerProfile.player.gender" class="pp-badge pp-badge--gender" x-text="playerProfile.player.gender === 'M' ? (tr().playerProfile?.male || 'Mężczyzna') : (tr().playerProfile?.female || 'Kobieta')"></span>
                                        <span x-show="playerProfile.player.country" class="pp-badge pp-badge--country">
                                            <img :src="codeToFlag(playerProfile.player.country)" width="16" height="12" alt="">
                                            <span x-text="playerProfile.player.country"></span>
                                        </span>
                                        <span x-show="playerProfile.player.age" class="pp-badge" x-text="formatText(tr().playerProfile?.ageLabel || '{years} lat', { years: playerProfile.player.age })"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Career Stats -->
                            <div class="pp-career">
                                <div class="pp-stat-grid">
                                    <div class="pp-stat">
                                        <div class="pp-stat__val" x-text="playerProfile.career.tournaments"></div>
                                        <div class="pp-stat__label" x-text="tr().playerProfile?.tournaments || 'Turnieje'"></div>
                                    </div>
                                    <div class="pp-stat">
                                        <div class="pp-stat__val" x-text="playerProfile.career.matches"></div>
                                        <div class="pp-stat__label" x-text="tr().playerProfile?.matches || 'Mecze'"></div>
                                    </div>
                                    <div class="pp-stat pp-stat--wins">
                                        <div class="pp-stat__val" x-text="playerProfile.career.wins"></div>
                                        <div class="pp-stat__label" x-text="tr().playerProfile?.wins || 'Wygrane'"></div>
                                    </div>
                                    <div class="pp-stat pp-stat--losses">
                                        <div class="pp-stat__val" x-text="playerProfile.career.losses"></div>
                                        <div class="pp-stat__label" x-text="tr().playerProfile?.losses || 'Przegrane'"></div>
                                    </div>
                                    <div class="pp-stat">
                                        <div class="pp-stat__val" x-text="profileWinRate()"></div>
                                        <div class="pp-stat__label" x-text="tr().playerProfile?.winRate || 'Skuteczność'"></div>
                                    </div>
                                </div>

                                <!-- Medals row -->
                                <div class="pp-medals" x-show="playerProfile.career.medals.gold || playerProfile.career.medals.silver || playerProfile.career.medals.bronze">
                                    <span class="pp-medal" x-show="playerProfile.career.medals.gold">🥇 <span x-text="playerProfile.career.medals.gold"></span></span>
                                    <span class="pp-medal" x-show="playerProfile.career.medals.silver">🥈 <span x-text="playerProfile.career.medals.silver"></span></span>
                                    <span class="pp-medal" x-show="playerProfile.career.medals.bronze">🥉 <span x-text="playerProfile.career.medals.bronze"></span></span>
                                </div>
                            </div>

                            <!-- Tournament History -->
                            <h3 class="pp-section-title" x-text="tr().playerProfile?.tournamentHistory || 'Historia turniejów'"></h3>

                            <div x-show="!playerProfile.tournaments || playerProfile.tournaments.length === 0" class="bracket-empty">
                                <p x-text="tr().playerProfile?.noTournaments || 'Brak turniejów'"></p>
                            </div>

                            <div class="pp-tournaments">
                                <template x-for="t in playerProfile.tournaments" :key="'ppt-'+t.tournament_id">
                                    <div class="pp-tourn">
                                        <!-- Tournament header (clickable) -->
                                        <div class="pp-tourn__header" @click="toggleProfileTournament(t.tournament_id)" role="button" tabindex="0" @keydown.enter="toggleProfileTournament(t.tournament_id)" :aria-expanded="!!profileExpandedTournaments[t.tournament_id]" :aria-label="t.tournament_name + ' – ' + t.wins + ' ' + (tr().playerProfile?.won || 'W') + ' / ' + t.losses + ' ' + (tr().playerProfile?.lost || 'P')">
                                            <div class="pp-tourn__left">
                                                <span class="pp-tourn__medal" x-show="t.medal" x-text="profileMedalEmoji(t.medal)"></span>
                                                <div>
                                                    <div class="pp-tourn__name" x-text="t.tournament_name"></div>
                                                    <div class="pp-tourn__dates" x-text="t.start_date + (t.end_date && t.end_date !== t.start_date ? ' – ' + t.end_date : '')"></div>
                                                </div>
                                            </div>
                                            <div class="pp-tourn__right">
                                                <span class="pp-tourn__record">
                                                    <span class="pp-tourn__w" x-text="t.wins + (tr().playerProfile?.won || 'W')"></span> /
                                                    <span class="pp-tourn__l" x-text="t.losses + (tr().playerProfile?.lost || 'P')"></span>
                                                </span>
                                                <span class="pp-tourn__group" x-show="t.group_name" x-text="(tr().playerProfile?.group || 'Grupa') + ' ' + translateCategory(t.group_name) + ': ' + t.group_position + '/' + t.group_total"></span>
                                                <span class="pp-tourn__chevron" :class="{ 'pp-tourn__chevron--open': profileExpandedTournaments[t.tournament_id] }">▸</span>
                                            </div>
                                        </div>

                                        <!-- Expanded: match list -->
                                        <div x-show="profileExpandedTournaments[t.tournament_id]" class="pp-tourn__matches">
                                            <template x-for="(m, mi) in t.matches" :key="'ppm-'+t.tournament_id+'-'+mi">
                                                <div class="pp-match" :class="{ 'pp-match--won': m.won, 'pp-match--lost': !m.won }">
                                                    <span class="pp-match__result" x-text="m.won ? '✓' : '✗'"></span>
                                                    <span class="pp-match__opponent" x-text="(tr().playerProfile?.vs || 'vs') + ' ' + resolveBracketName(m.opponent)"></span>
                                                    <span class="pp-match__sets">
                                                        <template x-for="(s, si) in m.score" :key="'ppms-'+mi+'-'+si">
                                                            <span class="pp-match__set" :class="{ 'pp-match__set--stb': s.stb }">
                                                                <span x-text="s.stb ? '['+s.g1+':'+s.g2+']' : s.g1+':'+s.g2"></span><sup class="pp-match__tb" x-show="s.tb !== null && s.tb !== undefined" x-text="s.tb"></sup>
                                                            </span>
                                                        </template>
                                                    </span>
                                                    <span class="pp-match__phase" x-show="m.phase" x-text="translatePhase(m.phase)"></span>
                                                </div>
                                            </template>
                                            <div x-show="!t.matches || t.matches.length === 0" class="pp-tourn__no-matches">
                                                <p x-text="tr().playerProfile?.noMatches || 'Brak meczow'"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div x-show="!playerProfile && !playerProfileLoading" class="empty-state">
                        <p x-text="tr().playerProfile?.notFound || 'Player not found'">Player not found</p>
                    </div>
                </div>

            </div><!-- end TAB: PLAYERS -->

        </main>

        <!-- Vestmedia Footer -->
        <footer class="vm-footer">
            <span class="vm-footer__refresh" x-show="lastUpdate" x-text="(tr().meta?.lastRefresh || 'Ostatnia aktualizacja: {time}').replace('{time}', lastUpdate ? lastUpdate.toLocaleTimeString(locale()) : '')"></span>
            <span class="vm-footer__sep" x-show="lastUpdate" aria-hidden="true">|</span>
            <span x-text="uiText().poweredBy || 'Powered by'">Powered by</span>
            <a href="https://vestmedia.pl" target="_blank" rel="noopener noreferrer" class="vm-footer__link">
                <img src="https://vestmedia.pl/wp-content/uploads/2024/12/Vest-Media-5.png"
                     alt="Vest Media" class="vm-footer__logo" loading="lazy">
            </a>
        </footer>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
