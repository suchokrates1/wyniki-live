<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyniki tenisowe – na żywo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎾</text></svg>">
    <meta name="description" content="Live tennis scores - wyniki na żywo">
</head>
<body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div x-data="tennisApp" x-cloak class="wrap" x-effect="document.title = tr().pageTitle || 'Wyniki tenisowe – na żywo'">
        
        <!-- Header -->
        <header class="header">
            <div class="header-bar">
                <h1 class="header-title">
                    <span x-text="tournamentName || 'Wyniki tenisowe – na żywo'">Wyniki tenisowe – na żywo</span>
                    <span x-show="hasActiveCourts()" class="live-badge">LIVE</span>
                </h1>
                <div class="header-actions">
                    <label class="sr-only" for="langSelect">Wybierz język</label>
                    <select id="langSelect" class="lang-select" x-model="lang" @change="onLangChange()">
                        <option value="pl">Polski</option>
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                    </select>
                    <button class="dark-mode-toggle" @click="toggleDarkMode()" :aria-label="darkMode ? 'Tryb jasny' : 'Tryb ciemny'">
                        <span class="dark-mode-toggle__icon" aria-hidden="true" x-text="darkMode ? '☀️' : '🌙'"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <div class="tab-bar">
            <button class="tab-btn" :class="{ 'tab-btn--active': activeTab === 'live' }" @click="activeTab = 'live'"
                    x-text="tr().tabs?.live || 'Na żywo'"></button>
            <button class="tab-btn" :class="{ 'tab-btn--active': activeTab === 'bracket' }" @click="switchToBracket()"
                    x-text="tr().tabs?.bracket || 'Drabinka'"></button>
            <button class="tab-btn" :class="{ 'tab-btn--active': activeTab === 'history' }" @click="activeTab = 'history'"
                    x-text="tr().tabs?.history || 'Historia'"></button>
        </div>

        <!-- Quick court navigation -->
        <nav x-show="activeTab === 'live' && getCourtIds().length > 0" :aria-label="t('navLabel')">
            <ul>
                <template x-for="courtId in getCourtIds()" :key="'nav-'+courtId">
                    <li><a :href="'#kort-'+courtId" x-text="t('courtLabel', {court: courtId})"></a></li>
                </template>
            </ul>
        </nav>
        
        <!-- Loading State -->
        <div x-show="loading" class="loading-state" role="status">
            <span class="spinner spinner--large"></span>
            <span class="sr-only" x-text="t('loading')">Ładowanie wyników...</span>
        </div>
        
        <!-- Error State -->
        <div x-show="error && !loading" class="error-bar" role="alert" aria-live="assertive">
            <span class="error" x-text="error"></span>
        </div>

        <!-- Main content -->
        <main id="main" tabindex="-1">

            <!-- ======= TAB: LIVE ======= -->
            <div x-show="activeTab === 'live'">
            <!-- Empty State -->
            <div x-show="!loading && getCourtIds().length === 0" class="empty-state">
                <div class="empty-state__icon">🎾</div>
                <h2 class="empty-state__title" x-text="t('emptyTitle')">Brak aktywnych kortów</h2>
                <p class="empty-state__text" x-text="t('emptyText')">Skonfiguruj korty w panelu administratora</p>
            </div>
            
            <!-- Courts Grid -->
            <div x-show="!loading" class="grid">
                <template x-for="courtId in getCourtIds()" :key="courtId">
                    <section class="card" :id="'kort-'+courtId" :aria-labelledby="'heading-'+courtId">
                        
                        <!-- Card Header -->
                        <div class="card-head">
                            <h2 :id="'heading-'+courtId"
                                :aria-label="getHeadingAria(courtId)">
                                <span class="court-label" x-text="t('courtLabel', {court: courtId})"></span>:
                                <span class="match-title">
                                    <span class="match-player" x-text="getPlayerName(courtId, 'A')"></span>
                                    <span class="match-versus">
                                        <span aria-hidden="true" x-text="tr().versus || 'vs'"></span>
                                        <span class="sr-only" x-text="acc().versus"></span>
                                    </span>
                                    <span class="match-player" x-text="getPlayerName(courtId, 'B')"></span>
                                </span>
                                <span x-show="isMatchActive(courtId)" class="live-badge" x-text="tr().liveBadge || 'LIVE'"></span>
                            </h2>
                        </div>

                        <!-- Scoreboard -->
                        <div class="score-wrapper">
                            <!-- Tiebreak labels (above scoreboard) -->
                            <div class="score-labels">
                                <div class="score-label score-label-tb"
                                     :class="{ 'is-visible': isTiebreak(courtId) && !isSuperTiebreak(courtId) }"
                                     aria-hidden="true" x-text="tr().tieBreakLabel || 'TB'"></div>
                                <div class="score-label score-label-stb"
                                     :class="{ 'is-visible': isSuperTiebreak(courtId) }"
                                     aria-hidden="true" x-text="tr().superTieBreakLabel || 'STB'"></div>
                            </div>

                            <!-- Score table (visual, hidden from screen readers) -->
                            <dl class="score-list" aria-hidden="true">
                                <!-- Player A -->
                                <div class="score-row" data-side="A">
                                    <dt class="player-cell">
                                        <span class="player-flag has-image" aria-hidden="true"
                                              x-show="courts[courtId]?.A?.flag_url || courts[courtId]?.A?.flag_code"
                                              :style="'background-image:url('+(courts[courtId]?.A?.flag_url || codeToFlag(courts[courtId]?.A?.flag_code))+')'">
                                        </span>
                                        <span class="player-name" :id="'k'+courtId+'-name-A'" x-text="getPlayerName(courtId, 'A')"></span>
                                        <span class="serve-indicator" x-show="courts[courtId]?.serve === 'A'" aria-hidden="true"><img src="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 36 36%27%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27%23C6E953%27/%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 11c4 8 14 14 26 6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 25c6-8 16-14 26-6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3C/svg%3E" alt="serve" style="width:14px;height:14px;"></span>
                                    </dt>
                                    <dd class="metric points" :aria-labelledby="'k'+courtId+'-label-points k'+courtId+'-name-A'">
                                        <span class="metric-label" :id="'k'+courtId+'-label-points'"
                                              x-text="getPointsLabel(courtId)"></span>
                                        <span class="metric-value points"
                                              :id="'k'+courtId+'-pts-A'"
                                              :class="{ 'is-tiebreak': isTiebreak(courtId) }"
                                              x-text="getDisplayPoints(courtId, 'A')"></span>
                                    </dd>
                                    <template x-for="setIdx in getSetIndices(courtId)" :key="'sA'+setIdx">
                                        <dd class="metric" :class="'set-'+setIdx"
                                            :aria-labelledby="'k'+courtId+'-label-set'+setIdx+' k'+courtId+'-name-A'">
                                            <span class="metric-label" :id="'k'+courtId+'-label-set'+setIdx"
                                                  x-text="t('setLabel', {number: setIdx})"
                                                  x-show="$el.closest('.score-row[data-side=A]')"></span>
                                            <span class="metric-value set"
                                                  :id="'k'+courtId+'-s'+setIdx+'-A'"
                                                  :class="{ 'is-active': courts[courtId]?.current_set == setIdx }">
                                                <span x-text="getSetScore(courtId, 'A', setIdx)"></span><sup class="tb-sup" x-show="getTiebreakInfo(courtId, setIdx) !== null && parseInt(getSetScore(courtId, 'A', setIdx)) < parseInt(getSetScore(courtId, 'B', setIdx))" x-text="getTiebreakInfo(courtId, setIdx)"></sup>
                                            </span>
                                        </dd>
                                    </template>
                                </div>

                                <!-- Player B -->
                                <div class="score-row" data-side="B">
                                    <dt class="player-cell">
                                        <span class="player-flag has-image" aria-hidden="true"
                                              x-show="courts[courtId]?.B?.flag_url || courts[courtId]?.B?.flag_code"
                                              :style="'background-image:url('+(courts[courtId]?.B?.flag_url || codeToFlag(courts[courtId]?.B?.flag_code))+')'">
                                        </span>
                                        <span class="player-name" :id="'k'+courtId+'-name-B'" x-text="getPlayerName(courtId, 'B')"></span>
                                        <span class="serve-indicator" x-show="courts[courtId]?.serve === 'B'" aria-hidden="true"><img src="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 36 36%27%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27%23C6E953%27/%3E%3Ccircle cx=%2718%27 cy=%2718%27 r=%2717%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 11c4 8 14 14 26 6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3Cpath d=%27M5 25c6-8 16-14 26-6%27 fill=%27none%27 stroke=%27%23fff%27 stroke-width=%272%27/%3E%3C/svg%3E" alt="serve" style="width:14px;height:14px;"></span>
                                    </dt>
                                    <dd class="metric points" :aria-labelledby="'k'+courtId+'-label-points k'+courtId+'-name-B'">
                                        <span class="metric-value points"
                                              :id="'k'+courtId+'-pts-B'"
                                              :class="{ 'is-tiebreak': isTiebreak(courtId) }"
                                              x-text="getDisplayPoints(courtId, 'B')"></span>
                                    </dd>
                                    <template x-for="setIdx in getSetIndices(courtId)" :key="'sB'+setIdx">
                                        <dd class="metric" :class="'set-'+setIdx"
                                            :aria-labelledby="'k'+courtId+'-label-set'+setIdx+' k'+courtId+'-name-B'">
                                            <span class="metric-value set"
                                                  :id="'k'+courtId+'-s'+setIdx+'-B'"
                                                  :class="{ 'is-active': courts[courtId]?.current_set == setIdx }">
                                                <span x-text="getSetScore(courtId, 'B', setIdx)"></span><sup class="tb-sup" x-show="getTiebreakInfo(courtId, setIdx) !== null && parseInt(getSetScore(courtId, 'B', setIdx)) < parseInt(getSetScore(courtId, 'A', setIdx))" x-text="getTiebreakInfo(courtId, setIdx)"></sup>
                                            </span>
                                        </dd>
                                    </template>
                                </div>
                            </dl>
                        </div>

                        <!-- Screen reader summary (hidden visually, read by screen readers) -->
                        <p class="sr-only score-summary" :id="'k'+courtId+'-summary'" aria-live="polite"
                           x-text="getScoreSummary(courtId)"></p>

                        <!-- Match info footer -->
                        <div class="card-footer" x-show="isMatchActive(courtId)">
                            <span class="match-time" x-show="courts[courtId]?.match_time?.seconds">
                                🕒 <span x-text="formatTime(courts[courtId]?.match_time?.seconds)"></span>
                            </span>
                            <span class="match-set" x-text="(tr().footer?.set || 'Set') + ' ' + (courts[courtId]?.current_set || 1)"></span>
                        </div>
                    </section>
                </template>
            </div>
            </div><!-- end TAB: LIVE -->

            <!-- ======= TAB: BRACKET ======= -->
            <div x-show="activeTab === 'bracket'">
                <!-- Loading -->
                <div x-show="bracketLoading" class="loading-state" role="status">
                    <span class="spinner spinner--large"></span>
                </div>

                <!-- No bracket configured -->
                <div x-show="!bracketLoading && (!bracketData || !bracketData.groups || bracketData.groups.length === 0)" class="empty-state">
                    <div class="empty-state__icon">🏆</div>
                    <h2 class="empty-state__title" x-text="tr().bracket?.emptyTitle || 'Brak drabinki'"></h2>
                    <p class="empty-state__text" x-text="tr().bracket?.emptyText || 'Drabinka turniejowa nie została jeszcze skonfigurowana'"></p>
                </div>

                <!-- Bracket with category tabs -->
                <template x-if="bracketData && bracketData.groups && bracketData.groups.length > 0">
                    <div class="bracket-content">

                        <!-- Category sub-tabs -->
                        <div class="cat-tabs" role="tablist" aria-label="Kategorie turniejowe">
                            <template x-for="cat in bracketCategories()" :key="'ct-'+cat.name">
                                <button class="cat-tab"
                                        role="tab"
                                        :id="'cat-tab-'+cat.name.replace(/\s+/g,'-')"
                                        :aria-selected="bracketCategory === cat.name"
                                        :aria-controls="'cat-panel-'+cat.name.replace(/\s+/g,'-')"
                                        :class="{ 'cat-tab--active': bracketCategory === cat.name }"
                                        @click="bracketCategory = cat.name"
                                        x-text="cat.name">
                                </button>
                            </template>
                        </div>

                        <!-- Category panel -->
                        <template x-for="cat in bracketCategories()" :key="'cp-'+cat.name">
                            <div x-show="bracketCategory === cat.name"
                                 role="tabpanel"
                                 :id="'cat-panel-'+cat.name.replace(/\s+/g,'-')"
                                 :aria-labelledby="'cat-tab-'+cat.name.replace(/\s+/g,'-')">

                                <!-- Group tables (side by side if 2 groups) -->
                                <div class="bracket-groups" :class="{ 'bracket-groups--pair': cat.groups.length === 2 }">
                                    <template x-for="(group, gi) in cat.groups" :key="'g-'+cat.name+'-'+gi">
                                        <section class="bracket-group" :aria-label="group.name">
                                            <h3 class="bracket-group__title">
                                                <span x-text="group.name"></span>
                                            </h3>

                                            <!-- Standings table -->
                                            <table class="bracket-table" :aria-label="'Tabela grupy ' + group.name">
                                                <thead>
                                                    <tr>
                                                        <th class="bt-pos" scope="col">#</th>
                                                        <th class="bt-name" scope="col" x-text="tr().bracket?.player || 'Zawodnik'"></th>
                                                        <th class="bt-stat" scope="col" x-text="tr().bracket?.wins || 'W'"></th>
                                                        <th class="bt-stat" scope="col" x-text="tr().bracket?.losses || 'L'"></th>
                                                        <th class="bt-stat" scope="col" x-text="tr().bracket?.setsHeader || 'S'"></th>
                                                        <th class="bt-stat" scope="col" x-text="tr().bracket?.gamesHeader || 'G'"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="(row, ri) in group.standings" :key="'gs-'+cat.name+'-'+gi+'-'+ri">
                                                        <tr :class="{ 'bt-qualify': ri < 2 && group.standings.length > 2 }">
                                                            <td class="bt-pos" x-text="ri + 1"></td>
                                                            <td class="bt-name" x-text="resolveBracketName(row.name)"></td>
                                                            <td class="bt-stat bt-stat--wins" x-text="row.wins"></td>
                                                            <td class="bt-stat bt-stat--losses" x-text="row.losses"></td>
                                                            <td class="bt-stat" x-text="row.sets_won + ':' + row.sets_lost"></td>
                                                            <td class="bt-stat" x-text="row.games_won + ':' + row.games_lost"></td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>

                                            <!-- Group matches -->
                                            <div class="bracket-matches" x-show="group.matches && group.matches.length > 0">
                                                <h4 class="bracket-matches__title" x-text="tr().bracket?.matchesTitle || 'Mecze grupowe'"></h4>
                                                <div class="bracket-match-list">
                                                    <template x-for="(m, mi) in group.matches" :key="'gm-'+cat.name+'-'+gi+'-'+mi">
                                                        <table class="bm-scoreboard"
                                                               :aria-label="resolveBracketName(m.player_a) + ' vs ' + resolveBracketName(m.player_b)">
                                                            <tbody>
                                                                <tr :class="{ 'bm-row--won': m.winner === m.player_a }">
                                                                    <td class="bm-name" x-text="resolveBracketName(m.player_a)"></td>
                                                                    <template x-for="(s, si) in (m.sets || [])" :key="'gms1-'+mi+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <span x-text="s.g1"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g1 < s.g2" x-text="s.tb"></sup>
                                                                        </td>
                                                                    </template>
                                                                </tr>
                                                                <tr :class="{ 'bm-row--won': m.winner === m.player_b }">
                                                                    <td class="bm-name" x-text="resolveBracketName(m.player_b)"></td>
                                                                    <template x-for="(s, si) in (m.sets || [])" :key="'gms2-'+mi+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <span x-text="s.g2"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g2 < s.g1" x-text="s.tb"></sup>
                                                                        </td>
                                                                    </template>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </template>
                                                </div>
                                            </div>
                                        </section>
                                    </template>
                                </div>

                                <!-- Bracket tree (only for categories with knockout) -->
                                <template x-if="cat.knockout.length > 0">
                                    <section class="bracket-tree" :aria-label="'Drabinka ' + cat.name">
                                        <h3 class="bracket-tree__title">Faza klasyfikacyjna</h3>

                                        <div class="bt-ladder">
                                            <template x-for="(ko, ki) in cat.knockout" :key="'ko-'+cat.name+'-'+ki">
                                                <div class="bt-round" :class="{ 'bt-round--final': ko.phase.includes('Finał') }">
                                                    <div class="bt-round-label" x-text="ko.phase"></div>
                                                    <template x-for="(slot, si) in ko.slots" :key="'kos-'+cat.name+'-'+ki+'-'+si">
                                                        <table class="bm-scoreboard bt-matchup"
                                                             :class="{ 'bt-matchup--final': ko.phase.includes('Finał') }"
                                                             role="group"
                                                             :aria-label="(resolveBracketName(slot.player1)||'?') + ' vs ' + (resolveBracketName(slot.player2)||'?')">
                                                            <tbody>
                                                                <tr :class="{ 'bm-row--won': slot.winner === slot.player1 }">
                                                                    <td class="bm-name" x-text="resolveBracketName(slot.player1) || '—'"></td>
                                                                    <template x-for="(s, si) in (slot.sets || [])" :key="'kos1-'+ki+'-'+si+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <span x-text="s.g1"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g1 < s.g2" x-text="s.tb"></sup>
                                                                        </td>
                                                                    </template>
                                                                    <template x-if="!slot.sets || slot.sets.length === 0">
                                                                        <td class="bm-set bm-set--empty"></td>
                                                                    </template>
                                                                </tr>
                                                                <tr :class="{ 'bm-row--won': slot.winner === slot.player2 }">
                                                                    <td class="bm-name" x-text="resolveBracketName(slot.player2) || '—'"></td>
                                                                    <template x-for="(s, si) in (slot.sets || [])" :key="'kos2-'+ki+'-'+si+'-'+si">
                                                                        <td class="bm-set" :class="{ 'bm-set--stb': s.stb }">
                                                                            <span x-text="s.g2"></span><sup class="bm-tb" x-show="s.tb !== null && s.tb !== undefined && s.g2 < s.g1" x-text="s.tb"></sup>
                                                                        </td>
                                                                    </template>
                                                                    <template x-if="!slot.sets || slot.sets.length === 0">
                                                                        <td class="bm-set bm-set--empty"></td>
                                                                    </template>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>

                                        <!-- Trophy / podium -->
                                        <div class="bt-podium" role="list" aria-label="Podium">
                                            <template x-for="(ko, ki) in cat.knockout" :key="'pod-'+cat.name+'-'+ki">
                                                <template x-if="ko.slots[0] && ko.slots[0].winner">
                                                    <div class="bt-podium-item" role="listitem">
                                                        <span class="bt-podium-medal" x-text="ko.phase.includes('Finał') ? '🥇' : ko.phase.includes('3.') ? '🥈' : ko.phase.includes('5.') ? '🥉' : ''"></span>
                                                        <span class="bt-podium-result">
                                                            <strong x-text="resolveBracketName(ko.slots[0].winner)"></strong>
                                                            <small x-text="ko.phase"></small>
                                                        </span>
                                                    </div>
                                                </template>
                                            </template>
                                        </div>
                                    </section>
                                </template>

                            </div>
                        </template>

                    </div>
                </template>
            </div><!-- end TAB: BRACKET -->

            <!-- ======= TAB: HISTORY ======= -->
            <div x-show="activeTab === 'history'">

        <!-- History Section -->
        <section id="history-section" x-show="sortedHistory().length > 0" aria-labelledby="history-title">
            <h3 id="history-title" class="hm-heading" x-text="tr().history?.title || 'Historia meczów'"></h3>
            <div class="hm-list" role="list">
                <template x-for="match in sortedHistory()" :key="match.id || match.match_id || match.ended_ts">
                    <article class="hm-card" role="listitem">
                        <!-- Screen reader summary (hidden visually) -->
                        <p class="sr-only" x-text="getHistoryAriaLabel(match)"></p>

                        <!-- Scoreboard: two player rows -->
                        <div class="hm-scoreboard" aria-hidden="true">
                            <!-- Player A row -->
                            <div class="hm-player" :class="{ 'hm-player--winner': getMatchWinner(match) === 'A' }">
                                <span class="hm-winner-mark" x-show="getMatchWinner(match) === 'A'" aria-hidden="true"></span>
                                <span class="hm-winner-mark hm-winner-mark--empty" x-show="getMatchWinner(match) !== 'A'" aria-hidden="true"></span>
                                <span class="hm-player-name" x-text="match.player_a || '-'"></span>
                                <span class="hm-sets">
                                    <template x-for="(set, i) in getMatchSets(match)" :key="'a-'+i">
                                        <span class="hm-set-cell" :class="{ 'hm-set-cell--won': set.a > set.b }">
                                            <span x-text="set.a"></span><sup class="hm-tb" x-show="set.tb !== null && !set.isSuperTB && set.a < set.b" x-text="set.tb"></sup>
                                        </span>
                                    </template>
                                </span>
                            </div>
                            <!-- Player B row -->
                            <div class="hm-player" :class="{ 'hm-player--winner': getMatchWinner(match) === 'B' }">
                                <span class="hm-winner-mark" x-show="getMatchWinner(match) === 'B'" aria-hidden="true"></span>
                                <span class="hm-winner-mark hm-winner-mark--empty" x-show="getMatchWinner(match) !== 'B'" aria-hidden="true"></span>
                                <span class="hm-player-name" x-text="match.player_b || '-'"></span>
                                <span class="hm-sets">
                                    <template x-for="(set, i) in getMatchSets(match)" :key="'b-'+i">
                                        <span class="hm-set-cell" :class="{ 'hm-set-cell--won': set.b > set.a }">
                                            <span x-text="set.b"></span><sup class="hm-tb" x-show="set.tb !== null && !set.isSuperTB && set.b < set.a" x-text="set.tb"></sup>
                                        </span>
                                    </template>
                                </span>
                            </div>
                        </div>

                        <!-- Match meta footer -->
                        <div class="hm-meta">
                            <div class="hm-meta-left">
                                <span class="hm-court-badge" x-text="(tr().history?.court || 'Kort') + ' ' + match.kort_id"></span>
                                <span class="hm-cat-badge" x-show="match.category" x-text="match.category"></span>
                                <span class="hm-phase" x-show="match.phase" x-text="match.phase"></span>
                                <span class="hm-time" x-show="match.duration_seconds">
                                    <svg class="hm-time-icon" aria-hidden="true" width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 4v4.5l3 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                                    <span x-text="formatTime(match.duration_seconds)"></span>
                                </span>
                                <span class="hm-date" x-show="match.ended_ts">
                                    <svg class="hm-time-icon" aria-hidden="true" width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M2 6.5h12M5.5 1.5v3M10.5 1.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                                    <span x-text="formatDate(match.ended_ts)"></span>
                                </span>
                            </div>
                            <button class="hm-details-btn"
                                    x-show="match.match_id"
                                    @click="toggleMatchDetails(match.match_id)"
                                    :aria-expanded="isMatchExpanded(match.match_id)"
                                    :aria-label="(isMatchExpanded(match.match_id) ? (tr().historyDetail?.collapse || 'Zwiń') : (tr().historyDetail?.details || 'Szczegóły')) + ' — ' + (match.player_a || '') + ' vs ' + (match.player_b || '')">
                                <span x-text="isMatchExpanded(match.match_id) ? (tr().historyDetail?.collapse || 'Zwiń') : (tr().historyDetail?.details || 'Szczegóły')"></span>
                                <svg class="hm-chevron" :class="{ 'hm-chevron--open': isMatchExpanded(match.match_id) }" aria-hidden="true" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>

                        <!-- Expandable stats panel -->
                        <div class="hm-details-panel" x-show="isMatchExpanded(match.match_id)" x-transition.duration.200ms>
                            <template x-if="getMatchStats(match.match_id)?.loading">
                                <div class="hm-details-status">
                                    <span class="spinner"></span>
                                    <span x-text="tr().historyDetail?.loading || 'Ładowanie...'"></span>
                                </div>
                            </template>
                            <template x-if="getMatchStats(match.match_id)?.error">
                                <div class="hm-details-status" x-text="tr().historyDetail?.noStats || 'Brak statystyk'"></div>
                            </template>
                            <template x-if="getMatchStats(match.match_id)?.player1_stats">
                                <div class="hm-stats">
                                    <div class="hm-stats-mode" x-show="getMatchStats(match.match_id)?.stats_mode"
                                         x-text="(getMatchStats(match.match_id)?.stats_mode || '').toUpperCase() === 'ADVANCED' ? (tr().stats?.advanced || 'Statystyki zaawansowane') : (tr().stats?.simple || 'Statystyki podstawowe')">
                                    </div>
                                    <!-- Stats comparison table -->
                                    <table class="hm-stats-table" role="table">
                                        <thead>
                                            <tr>
                                                <th scope="col" class="hm-stats-th hm-stats-th--name" x-text="match.player_a || tr().players?.defaultA || 'Gracz A'"></th>
                                                <th scope="col" class="hm-stats-th hm-stats-th--label"></th>
                                                <th scope="col" class="hm-stats-th hm-stats-th--name" x-text="match.player_b || tr().players?.defaultB || 'Gracz B'"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template x-for="row in getStatsRowsPaired(getMatchStats(match.match_id))" :key="row.label">
                                                <tr class="hm-stats-row">
                                                    <td class="hm-stats-val" :class="{ 'hm-stats-val--better': row.p1Better }" x-text="row.p1"></td>
                                                    <td class="hm-stats-label" x-text="row.label"></td>
                                                    <td class="hm-stats-val" :class="{ 'hm-stats-val--better': row.p2Better }" x-text="row.p2"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                    <div class="hm-stats-footer">
                                        <span class="hm-stats-winner" x-show="getMatchStats(match.match_id)?.winner">
                                            🏆 <span x-text="getMatchStats(match.match_id)?.winner"></span>
                                        </span>
                                        <span class="hm-stats-duration" x-show="getMatchStats(match.match_id)?.match_duration_ms > 0">
                                            🕒 <span x-text="formatTime(Math.floor((getMatchStats(match.match_id)?.match_duration_ms || 0) / 1000))"></span>
                                        </span>
                                    </div>
                                    <div class="hm-stats-times" x-show="getMatchStats(match.match_id)?.started_at || getMatchStats(match.match_id)?.ended_at">
                                        <span x-show="getMatchStats(match.match_id)?.started_at">
                                            <span class="hm-stats-times__label" x-text="tr().historyDetail?.startedAt || 'Rozpoczęcie:'"></span>
                                            <span x-text="formatDateTime(getMatchStats(match.match_id)?.started_at)"></span>
                                        </span>
                                        <span x-show="getMatchStats(match.match_id)?.ended_at">
                                            <span class="hm-stats-times__label" x-text="tr().historyDetail?.endedAt || 'Zakończenie:'"></span>
                                            <span x-text="formatDateTime(getMatchStats(match.match_id)?.ended_at)"></span>
                                        </span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </article>
                </template>
            </div>
        </section>

            </div><!-- end TAB: HISTORY -->
        </main>

        <!-- Vestmedia Footer -->
        <footer class="vm-footer">
            <span class="vm-footer__refresh" x-show="lastUpdate" x-text="(tr().meta?.lastRefresh || 'Ostatnia aktualizacja: {time}').replace('{time}', lastUpdate ? lastUpdate.toLocaleTimeString('pl-PL') : '')"></span>
            <span class="vm-footer__sep" x-show="lastUpdate" aria-hidden="true">|</span>
            <span>Powered by</span>
            <a href="https://vestmedia.pl" target="_blank" rel="noopener noreferrer" class="vm-footer__link">
                <img src="https://vestmedia.pl/wp-content/uploads/2024/12/Vest-Media-5.png"
                     alt="Vest Media" class="vm-footer__logo" loading="lazy">
            </a>
        </footer>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
