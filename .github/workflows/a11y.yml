name: Public a11y & build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wyniki-v2/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wyniki-v2/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build public frontend
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: WCAG 2.2 AA scan (axe, color-contrast enabled) on mocked build
        run: npm run test:a11y:ci
